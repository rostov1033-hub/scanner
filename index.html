<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сканер коробок</title>
  <style>
    body { font-family: -apple-system, Roboto, sans-serif; margin: 0; padding: 12px; background: #f5f5f5; }
    /* компактное окно сканирования: показываем только полосу нужной высоты */
    #reader-wrap { max-width: 420px; height: 150px; margin: 0 auto; border-radius: 8px;
                   overflow: hidden; position: relative; background: #000; }
    #reader { width: 100%; }
    #reader video { width: 100% !important; height: 150px !important; object-fit: cover; }
    .status { text-align: center; color: #2e7d32; font-weight: 600; margin: 10px 0; font-size: 14px; }
    .hint { color: #2e7d32; font-weight: 600; }
    .warn { color: #c62828; font-weight: 600; }
    #card { max-width: 420px; margin: 12px auto; background: #fff; border-radius: 8px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,.12); display: none; }
    #card table { width: 100%; border-collapse: collapse; }
    #card td { padding: 6px 4px; border-bottom: 1px solid #eee; font-size: 15px; vertical-align: top; }
    #card td:first-child { color: #666; white-space: nowrap; padding-right: 12px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 14px;
             font-weight: 600; margin-bottom: 10px; }
    .st-new  { background: #fdecea; color: #c62828; }
    .st-work { background: #fff8e1; color: #b28704; }
    .st-done { background: #e8f5e9; color: #2e7d32; }
    .badge-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.badge-row .badge { margin-bottom: 0; }
.counter { color: #1a73e8; font-weight: 600; font-size: 14px; text-decoration: underline; }
#supplyList { margin-top: 12px; border-top: 2px solid #eee; padding-top: 10px; }
#supplyList b { display: block; margin: 8px 0 4px; font-size: 14px; }
#supplyList .badge { padding: 2px 8px; font-size: 12px; }
    #allSupplies { max-width: 420px; margin: 12px auto; background: #fff; border-radius: 8px;
               padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.12); display: none; }
#allSupplies > b { display: block; margin-bottom: 6px; }
.sup-row { padding: 9px 0; border-bottom: 1px solid #eee; cursor: pointer; font-size: 15px; }
.sup-detail { padding: 2px 0 8px 10px; }
.sup-green { color: #2e7d32; font-weight: 600; }
.sup-red { color: #c62828; font-weight: 600; }
    button { display: block; width: 100%; max-width: 420px; margin: 10px auto 0; padding: 13px;
             font-size: 16px; border: none; border-radius: 8px; color: #fff; }
    .btn-start { background: #1a73e8; }
    .btn-close { background: #e65100; }
    .btn-gray  { background: #9e9e9e; }
  </style>
</head>
<body>
  <div id="reader-wrap"><div id="reader"></div></div>
  <p class="status" id="status">Загрузка…</p>
  <div id="card"></div>
  <button id="btnStart" class="btn-start" style="display:none">Начать запаковку</button>
  <button id="btnClose" class="btn-close" style="display:none">Закрыть коробку</button>
  <button id="btnCancel" class="btn-gray" style="display:none">Отмена</button>
  <button id="btnAgain" class="btn-gray" style="display:none">Сканировать другую коробку</button>
  <button id="btnSupplies" class="btn-gray" style="display:none">Все поставки</button>
<div id="allSupplies"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // ===== ВСТАВЬТЕ ССЫЛКУ ВЕБ-ПРИЛОЖЕНИЯ (/exec) =====
    const API_URL = 'https://script.google.com/macros/s/AKfycbwWvL9ZdXJCwQNnjFcOv5FmuG17Qipoo37XeHaLH14aUYaUSfNydCa8OyBn2BHklpMD/exec';

    const ST_NEW = 'Не начата', ST_WORK = 'В процессе', ST_DONE = 'Закрыта';
    const el = id => document.getElementById(id);
    const statusEl = el('status'), cardEl = el('card');

    let db = null;
    let currentCode = null;     // коробка, с которой работаем
    let mode = 'scan';          // scan — обычный скан; confirm — ждём повторный скан для закрытия

    // ---------- ПИН ----------
    function getPin() {
      let pin = localStorage.getItem('scanner_pin');
      if (!pin) {
        pin = prompt('Введите ПИН доступа:') || '';
        localStorage.setItem('scanner_pin', pin);
      }
      return pin;
    }
    function api(params) {
      return fetch(API_URL + '?' + params + '&key=' + encodeURIComponent(getPin()))
        .then(r => r.json())
        .then(res => {
          if (res.error === 'auth') {
            localStorage.removeItem('scanner_pin');
            alert('Неверный ПИН');
            location.reload();
            throw new Error('auth');
          }
          return res;
        });
    }

    // ---------- Загрузка таблицы ----------
    api('all=1')
      .then(res => {
        db = res.all || {};
        statusEl.textContent = 'Отсканируйте штрих-код коробки';
        el('btnSupplies').style.display = 'block';
      })
      .catch(() => { statusEl.textContent = 'Ошибка загрузки таблицы. Обновите страницу.'; });

    // ---------- Сканер ----------
    const scanner = new Html5Qrcode('reader', {
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.ITF
      ]
    });
    function startScanner() {
      return scanner.start(
        { facingMode: 'environment' },
        { fps: 15, qrbox: { width: 300, height: 110 },
          videoConstraints: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
        onScan
      ).then(() => {
        // если открыта карточка и мы не ждём подтверждающего скана — камера должна стоять на паузе
        if (currentCode && mode === 'scan') scanner.pause(true);
      }).catch(err => { statusEl.textContent = 'Не удалось открыть камеру: ' + err; });
    }
    startScanner();

    // при возврате на вкладку/из свёрнутого браузера перезапускаем камеру
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      scanner.stop().catch(() => {}).then(() => startScanner());
    });

    function onScan(text) {
      if (!db) { statusEl.textContent = 'Данные ещё загружаются, подождите…'; return; }
      const code = String(text).trim();
      if (mode === 'confirm') {
        if (code === currentCode) {
          scanner.pause(true);
          doAction('close', ST_DONE);
        } else {
          statusEl.innerHTML = '<span class="warn">Штрих-коды не совпадают!</span> Отсканируйте коробку «' + currentCode + '»';
        }
        return;
      }
      scanner.pause(true);
      currentCode = code;
      render();
    }

    // ---------- Отрисовка карточки ----------
    function render() {
      hideButtons();
      const box = db[currentCode];
      cardEl.style.display = 'block';

      if (!box) {
        statusEl.textContent = '';
        cardEl.innerHTML = '<span class="warn">Код «' + currentCode + '» не найден в таблице</span>';
        el('btnAgain').style.display = 'block';
        el('btnSupplies').style.display = 'block';
        return;
      }

      const cls = box.status === ST_DONE ? 'st-done' : box.status === ST_WORK ? 'st-work' : 'st-new';
      const stats = supplyStats(box.supply);
      let html = '<div class="badge-row"><span class="badge ' + cls + '">' + box.status + '</span>' +
        '<span class="counter" onclick="toggleSupply()">Закрыто ' + stats.done + '/' + stats.total + '</span></div><table>';
      for (const k in box.info) html += '<tr><td>' + k + '</td><td>' + box.info[k] + '</td></tr>';
      cardEl.innerHTML = html + '</table><div id="supplyList" style="display:none"></div>';
      statusEl.textContent = '';

      if (box.status === ST_NEW) {
        el('btnStart').style.display = 'block';
      } else if (box.status === ST_WORK) {
        statusEl.innerHTML = '<span class="hint">Положите товары в коробку, запакуйте и наклейте стикер</span>';
        el('btnClose').style.display = 'block';
      } else {
        statusEl.textContent = 'Коробка уже закрыта';
      }
      el('btnAgain').style.display = 'block';
      el('btnSupplies').style.display = 'block';
    }

    function hideButtons() {
      ['btnStart', 'btnClose', 'btnCancel', 'btnAgain', 'btnSupplies'].forEach(id => el(id).style.display = 'none');
      el('allSupplies').style.display = 'none';
    }

    function supplyStats(supply) {
      let total = 0, done = 0;
      for (const code in db) {
        if (db[code].supply === supply) {
          total++;
          if (db[code].status === ST_DONE) done++;
        }
      }
      return { total: total, done: done };
    }

    function supplyBoxesHtml(supply) {
      let html = '<table>';
      for (const code in db) {
        const b = db[code];
        if (b.supply !== supply) continue;
        const c = b.status === ST_DONE ? 'st-done' : b.status === ST_WORK ? 'st-work' : 'st-new';
        html += '<tr><td>' + code + '<br><small style="color:#666">' + (b.article || '—') +
                ' — ' + (b.qty || '?') + ' шт.</small></td>' +
                '<td style="text-align:right"><span class="badge ' + c + '">' + b.status + '</span></td></tr>';
      }
      return html + '</table>';
    }

    function toggleSupply() {
      const listEl = el('supplyList');
      if (listEl.style.display === 'block') { listEl.style.display = 'none'; return; }
      const supply = db[currentCode].supply;
      listEl.innerHTML = '<b>Коробки поставки «' + supply + '»</b>' + supplyBoxesHtml(supply);
      listEl.style.display = 'block';
    }

    // ---------- Действия ----------
    function doAction(action, newStatus) {
      statusEl.textContent = 'Сохраняю…';
      hideButtons();
      api('action=' + action + '&code=' + encodeURIComponent(currentCode))
        .then(res => {
          if (res.ok) {
            db[currentCode].status = newStatus;
            mode = 'scan';
            render();
          } else {
            statusEl.innerHTML = '<span class="warn">' + (res.error || 'ошибка') + '</span>';
            el('btnAgain').style.display = 'block';
            el('btnSupplies').style.display = 'block';
          }
        })
        .catch(() => {
          statusEl.innerHTML = '<span class="warn">Нет связи, попробуйте ещё раз</span>';
          render();
        });
    }

    el('btnStart').onclick = () => doAction('start', ST_WORK);

    el('btnClose').onclick = () => {
      mode = 'confirm';
      hideButtons();
      el('btnCancel').style.display = 'block';
      statusEl.innerHTML = '<span class="hint">Для закрытия отсканируйте штрих-код коробки «' + currentCode + '» ещё раз</span>';
      scanner.resume();
    };

    el('btnCancel').onclick = () => {
      mode = 'scan';
      scanner.pause(true);
      render();
    };

    el('btnAgain').onclick = () => {
      mode = 'scan';
      currentCode = null;
      cardEl.style.display = 'none';
      hideButtons();
      statusEl.textContent = 'Отсканируйте штрих-код коробки';
      el('btnSupplies').style.display = 'block';
      scanner.resume();
    };

    el('btnSupplies').onclick = () => {
      const panel = el('allSupplies');
      if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
      const stats = {};
      for (const code in db) {
        const b = db[code];
        const st = (stats[b.supply] = stats[b.supply] || { total: 0, done: 0, clusters: [] });
        st.total++;
        if (b.status === ST_DONE) st.done++;
        if (b.cluster && st.clusters.indexOf(b.cluster) === -1) st.clusters.push(b.cluster);
      }
      let html = '<b>Все поставки</b>';
      for (const s in stats) {
        const st = stats[s];
        const cls = st.done === st.total ? 'sup-green' : 'sup-red';
        html += '<div class="sup-row" data-supply="' + s + '">«' + s + '» — <span class="' + cls +
                '">Закрыто ' + st.done + '/' + st.total + '</span>' +
                (st.clusters.length ? '<br><small style="color:#666">' + st.clusters.join(', ') + '</small>' : '') +
                '</div><div class="sup-detail" style="display:none"></div>';
      }
      panel.innerHTML = html;
      panel.querySelectorAll('.sup-row').forEach(row => {
        row.onclick = () => {
          const det = row.nextElementSibling;
          if (det.style.display === 'block') { det.style.display = 'none'; return; }
          det.innerHTML = supplyBoxesHtml(row.dataset.supply);
          det.style.display = 'block';
        };
      });
      panel.style.display = 'block';
    };
  </script>
</body>
</html>
